<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #search {
            padding: 10px;
            width: 80%;
            max-width: 600px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .card h2 {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>HTML Tags - 102 Examples</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search for tags...">
    </div>
    <div class="card-grid" id="tagContainer">
        <!-- Cards will be dynamically added here -->
    </div>
    <script>
        const tags = [
            { name: "<!DOCTYPE>", description: "Defines the document type.", usage: "<!DOCTYPE html>", info: "Used in all HTML5 documents." },
            { name: "<html>", description: "Root element of an HTML page.", usage: "<html lang='en'>...</html>", info: "Defines the language of the document." },
            { name: "<head>", description: "Contains meta-information about the document.", usage: "<head>...</head>", info: "Not displayed in the browser." },
            { name: "<title>", description: "Sets the title of the document.", usage: "<title>My Page</title>", info: "Displayed in the browser tab." },
            {...}, // Add other HTML tags in similar format
        ];

        const tagContainer = document.getElementById('tagContainer');
        const searchInput = document.getElementById('search');

        function displayTags(filteredTags) {
            tagContainer.innerHTML = '';
            filteredTags.forEach(tag => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h2>${tag.name}</h2><p>${tag.description}</p><p><strong>Usage:</strong> ${tag.usage}</p><p><em>${tag.info}</em></p>`;
                tagContainer.appendChild(card);
            });
        }

        function filterTags() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredTags = tags.filter(tag => tag.name.toLowerCase().includes(searchTerm));
            displayTags(filteredTags);
        }

        searchInput.addEventListener('input', filterTags);
        displayTags(tags); // Initial display of tags
    </script>
</body>
</html>
