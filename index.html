<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 HTML Tags</title>
    <style>
        body {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        #search {
            margin-bottom: 20px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>102 HTML Tags with Descriptions and Examples</h1>
    <input type="text" id="search" placeholder="Search for tags..." onkeyup="filterTags()">
    <table>
        <thead>
            <tr>
                <th>Tag</th>
                <th>Description</th>
                <th>Example</th>
            </tr>
        </thead>
        <tbody id="tagsList">
            <!-- Example rows for tags -->
            <tr>
                <td>&lt;a&gt;</td>
                <td>Defines a hyperlink.</td>
                <td>&lt;a href='https://example.com'&gt;Example&lt;/a&gt;</td>
            </tr>
            <tr>
                <td>&lt;div&gt;</td>
                <td>Defines a division or section.</td>
                <td>&lt;div&gt;Content&lt;/div&gt;</td>
            </tr>
            <!-- More rows should be added here up to 102 tags -->
        </tbody>
    </table>

    <script>
        function filterTags() {
            var input, filter, table, tr, td, i, j, txtValue;
            input = document.getElementById("search");
            filter = input.value.toUpperCase();
            table = document.getElementById("tagsList");
            tr = table.getElementsByTagName("tr");
            for (i = 0; i < tr.length; i++) {
                tr[i].style.display = "none";
                td = tr[i].getElementsByTagName("td");
                for (j = 0; j < td.length; j++) {
                    if (td[j]) {
                        txtValue = td[j].textContent || td[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            tr[i].style.display = "";
                            break;
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
